        #isoPanel{position:absolute;top:16px;right:16px;z-index:1300;width:345px;max-height:calc(100% - 32px);overflow-y:auto;background:rgba(255,255,255,.96);border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.28);padding:14px;font-family:Arial,sans-serif;font-size:13px;color:#222;}

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

        // Station-based Isochrone Explorer with congestion-adjusted car catchments
        (function () {
            var currentMode='walk', selectedStation=null, selectedStationLayer=null;
            var selectedIsochroneLayer=L.featureGroup().addTo(map);
            [layer_car_7min_enriched_1,layer_car_3min_enriched_2,layer_15_walk_enriched_3,layer_10_walk_enriched_4,layer_5_walk_enriched_5].forEach(function(l){if(map.hasLayer(l))map.removeLayer(l);});
            function keepMetroOnTop(){try{layer_metrolinesstationsmetrolinesstation_7.bringToFront();}catch(e){} try{layer_metro_points_8.bringToFront();}catch(e){} if(selectedStationLayer){try{selectedStationLayer.bringToFront();}catch(e){}}}
            map.on('layeradd zoomend moveend',keepMetroOnTop);
            var isoSources=[{mode:'walk',minutes:5,data:json_5_walk_enriched_5,label:'5 min'},{mode:'walk',minutes:10,data:json_10_walk_enriched_4,label:'10 min'},{mode:'walk',minutes:15,data:json_15_walk_enriched_3,label:'15 min'},{mode:'car',minutes:5,data:json_car_3min_enriched_2,label:'5 min',sourceMinutes:3},{mode:'car',minutes:10,data:json_car_7min_enriched_1,label:'10 min',sourceMinutes:7}];
            var panel=document.createElement('div');panel.id='isoPanel';panel.innerHTML='<div id="panelHeader"><img src="images/Namma_metro.svg" alt="Namma Metro logo"><h1>Bangalore Namma Metro</h1><div class="subtitle">Isochrone catchment</div><div class="credit">by HAREESH A N, MCP batch (2025–27)</div></div><h2>Metro Station</h2><div class="modeButtons"><button id="walkBtn" class="active" type="button">Walk</button><button id="carBtn" type="button">Car</button></div><div id="stationInfo" class="summaryCard">No station selected.</div><div id="populationInfo"></div>';document.body.appendChild(panel);
            function norm(v){return(v==null?'':String(v).trim().toLowerCase().replace(/[^a-z0-9]+/g,''));}
            function rawStationId(p){return p.id||p.ID||p.station_id||p.Station_ID||p.Name||p.name||p.station_name||'';}
            function rawIsoId(p){return p.station_id||p.Station_ID||p.ID||p.id||p.Name||p.name||p.station_name||'';}
            function stationName(p){return p.Name||p.name||p.station_name||p.Station||rawStationId(p)||'Selected station';}
            function stationLine(p){return p.description||p.line||p.Line||p.line_name||'';}
            function lineColor(line){line=String(line||'').toLowerCase();if(line.indexOf('blue')>=0)return '#57a1e4';if(line.indexOf('green')>=0)return '#22d553';if(line.indexOf('purple')>=0)return '#8c00ff';if(line.indexOf('pink')>=0)return '#ff68ff';if(line.indexOf('red')>=0)return '#e74c3c';if(line.indexOf('yellow')>=0)return '#ffdd1a';return '#777';}
            function minutesOf(p,src){return src&&src.minutes?src.minutes:(Number(p.AA_MINS||p.time_min||p.minutes||p.isochrone)||0);}
            function populationOf(p){return Number(p.pop_raster||p.Pop_raster||p.POP_RASTER||p.pop_total||p.Pop_total||p.POP_TOTAL||p.TOTAL_POP||p.population||p.pop_sum||p.SUM||p.sum||0)||0;}
            function areaOf(p){return Number(p.area_sqkm||p.Area_sqkm||p.AREA_SQKM||p.area_km2||p.Area_km2||0)||0;}
            function isoCenter(feature){var p=feature.properties||{};var lat=Number(p.CENTER_LAT||p.center_lat||p.lat||p.Latitude||p.latitude);var lon=Number(p.CENTER_LON||p.center_lon||p.lon||p.Longitude||p.longitude);if(isFinite(lat)&&isFinite(lon))return L.latLng(lat,lon);try{return L.geoJSON(feature).getBounds().getCenter();}catch(e){return null;}}
            function fmt(v){return isFinite(v)?Math.round(v).toLocaleString('en-IN'):'-';}
            function fmt2(v){return isFinite(v)?Number(v).toLocaleString('en-IN',{maximumFractionDigits:2}):'-';}
            function stationStyle(feature,selected){var line=String(stationLine(feature.properties||{})).toLowerCase();var fill='#777';if(line.indexOf('blue')>=0)fill='#57a1e4';else if(line.indexOf('green')>=0)fill='#65e27b';else if(line.indexOf('purple')>=0)fill='#9a76ff';else if(line.indexOf('pink')>=0)fill='#ff68ff';else if(line.indexOf('red')>=0)fill='#e74c3c';else if(line.indexOf('yellow')>=0)fill='#fcff00';return{pane:'pane_metro_points_8',radius:selected?7:4,opacity:1,color:selected?'#111':'#333',weight:selected?3:1,fill:true,fillOpacity:1,fillColor:fill,interactive:true};}
            function isoStyle(feature){var m=minutesOf(feature.properties||{},feature.sourceMeta||{});var color=currentMode==='walk'?'#2980b9':'#e67e22';var op=m<=5?.44:m<=10?.30:.18;return{pane:'pane_selected_isochrones',color:color,weight:2,opacity:.95,fillColor:color,fillOpacity:op,interactive:true};}
            var stations=[];layer_metro_points_8.eachLayer(function(layer,idx){var props=layer.feature.properties||{};var s={idx:idx,layer:layer,id:norm(rawStationId(props)),name:stationName(props),line:stationLine(props),latlng:layer.getLatLng()};stations.push(s);layer.setStyle(stationStyle(layer.feature,false));layer.bindTooltip(s.name,{sticky:true});layer.on('click',function(){selectStation(s);});});
            function setMode(mode){currentMode=mode;document.getElementById('walkBtn').classList.toggle('active',mode==='walk');document.getElementById('carBtn').classList.toggle('active',mode==='car');updateDisplay();}
            document.getElementById('walkBtn').onclick=function(){setMode('walk');};document.getElementById('carBtn').onclick=function(){setMode('car');};window.setTravelMode=setMode;
            function selectStation(s){selectedStation=s;if(selectedStationLayer)selectedStationLayer.setStyle(stationStyle(selectedStationLayer.feature,false));selectedStationLayer=s.layer;s.layer.setStyle(stationStyle(s.layer.feature,true));s.layer.bringToFront();updateDisplay();}
            function getMatches(){if(!selectedStation)return{matches:[],method:''};var matches=[],method='ID match';isoSources.forEach(function(src){if(src.mode!==currentMode||!src.data||!src.data.features)return;src.data.features.forEach(function(f){var fid=norm(rawIsoId(f.properties||{}));if(fid&&fid===selectedStation.id)matches.push({source:src,feature:f,distance:0});});});if(matches.length===0){method='Nearest coordinate match';isoSources.forEach(function(src){if(src.mode!==currentMode||!src.data||!src.data.features)return;var best=null;src.data.features.forEach(function(f){var c=isoCenter(f);var d=(c&&selectedStation.latlng)?selectedStation.latlng.distanceTo(c):Infinity;if(!best||d<best.distance)best={source:src,feature:f,distance:d};});if(best&&best.distance<=1500)matches.push(best);});}matches.sort(function(a,b){return minutesOf(a.feature.properties||{},a.source)-minutesOf(b.feature.properties||{},b.source);});return{matches:matches,method:method};}
            function updateDisplay(){selectedIsochroneLayer.clearLayers();var stationBox=document.getElementById('stationInfo'),popBox=document.getElementById('populationInfo');if(!selectedStation){stationBox.innerHTML='No station selected.';popBox.innerHTML='';keepMetroOnTop();return;}var result=getMatches(),matches=result.matches;stationBox.innerHTML='<div class="stationLabel">Metro Station</div><div class="stationName">'+selectedStation.name+'</div>'+(selectedStation.line?'<div class="lineSwatch" title="'+selectedStation.line+' line" style="background:'+lineColor(selectedStation.line)+'"></div>':'');if(matches.length===0){popBox.innerHTML='<div class="note">No '+currentMode+' isochrone found within 1.5 km of this station. Check whether this station was included while generating isochrones.</div>';keepMetroOnTop();return;}var maxPop=0,maxArea=0,rows='';matches.forEach(function(item){item.feature.sourceMeta=item.source;var p=item.feature.properties||{};var min=minutesOf(p,item.source),pop=populationOf(p),area=areaOf(p);maxPop=Math.max(maxPop,pop);maxArea=Math.max(maxArea,area);var sourceText=item.source.sourceMinutes?(' <span style="color:#777">('+item.source.sourceMinutes+' min × congestion factor 0.7)</span>'):'';rows+='<tr><td>'+min+' min</td><td>'+fmt(pop)+'</td><td>'+fmt2(area)+'</td></tr>';L.geoJSON(item.feature,{pane:'pane_selected_isochrones',style:isoStyle,onEachFeature:function(f,lyr){lyr.bindPopup('<b>'+selectedStation.name+'</b><br>Isochrone: '+min+' min'+sourceText+'<br>Population: '+fmt(pop)+'<br>Area: '+fmt2(area)+' sq.km<br><span style="color:#666">Match: '+result.method+(item.distance?' ('+Math.round(item.distance)+' m)':'')+'</span>');}}).addTo(selectedIsochroneLayer);});popBox.innerHTML='<h3>Selected Station Stats</h3><div class="summaryCard"><b>Population covered</b><br><span class="statValue">'+fmt(maxPop)+'</span> people<br><b>Catchment area</b><br><span class="statValue">'+fmt2(maxArea)+'</span> sq.km</div><table class="popTable"><thead><tr><th>Isochrone</th><th>Population</th><th>Area sq.km</th></tr></thead><tbody>'+rows+'</tbody></table><div class="note">Walk: 5, 10, 15 min. Car: 5, 10 min after applying congestion factor 0.7 to 3 and 7 min car catchments.</div>';try{map.fitBounds(selectedIsochroneLayer.getBounds(),{padding:[30,30]});}catch(e){}keepMetroOnTop();}
            keepMetroOnTop();
        })();
        </script>
